project:
  name: en-ja-translation
  domain: general_mixed
  seed: 42

model:
  base_model_id: Qwen/Qwen2.5-0.5B-Instruct
  model_local_path: models/qwen-qwen2.5-0.5b-instruct

variant:
  id: s0
  description: Prompt-only baseline on dev split

generation:
  num_beams: 1
  max_new_tokens: 192
  batch_size: 64

io:
  input_path: data/splits/dev_v2.jsonl
  output_path: results/metrics/s0_dev_outputs.jsonl
  metrics_path: results/metrics/s0_dev_metrics.json
  qualitative_path: results/qualitative_examples/s0_dev.json
